<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1F5C3F" />
    <meta name="description" content="L'app pour trouver ton partenaire de padel près de chez toi. Selon ton niveau, ton club, tes dispos." />
    <meta name="keywords" content="padel, partenaire padel, trouver un partenaire, sport, club de padel, niveau padel" />

    <!-- Open Graph (aperçu lors du partage du lien) -->
    <meta property="og:title" content="Padel Meet — Trouve ton partenaire de padel" />
    <meta property="og:description" content="Trouve des partenaires de padel de ton niveau, près de chez toi." />
    <meta property="og:url" content="https://padel-meet.vercel.app" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://padel-meet.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Padel Meet — Trouve ton partenaire de padel" />
    <meta name="twitter:description" content="Trouve des partenaires de padel de ton niveau, près de chez toi." />
    <meta name="twitter:image" content="https://padel-meet.vercel.app/og-image.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Padel Meet" />

    <title>Padel Meet</title>

    <!-- Google Identity Services — One Tap auth (évite le redirect supabase.co) -->
    <script src="https://accounts.google.com/gsi/client" async></script>

    <!-- Google Search Console verification -->
    <meta name="google-site-verification" content="Y0iKL4BwX8R5Mi1CQgknALMs4nu86hxYeQN1Bw6R0Ds" />
  <!-- Données structurées pour Google (OAuth brand verification + SEO) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Padel Meet",
    "description": "L'application pour trouver des partenaires de padel selon ton niveau réel, près de chez toi. Matchmaking intelligent basé sur ton niveau, ton club et tes disponibilités.",
    "applicationCategory": "SportsApplication",
    "operatingSystem": "Web",
    "url": "https://padel-meet.vercel.app",
    "inLanguage": "fr",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" }
  }
  </script>
  </head>
  <body>
    <div id="root">
      <!-- Visible avant que React charge — crawlers Google + écran de chargement -->
      <div id="app-preload" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#F7F3EC;font-family:sans-serif;text-align:center;padding:24px">
        <div style="color:#1F5C3F;font-size:32px;font-weight:700;margin-bottom:8px">Padel Meet</div>
        <p style="color:#6B7A6B;font-size:16px;max-width:320px;line-height:1.5;margin:0">
          L'app pour trouver des partenaires de padel selon ton niveau réel,<br>près de chez toi.
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register Service Worker pour PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then((reg) => console.log('✅ Service Worker enregistré', reg))
            .catch((err) => console.error('❌ Service Worker erreur:', err));
        });
      }
    </script>
  </body>
</html>
